<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedInfo – Sichere Gesundheitsrecherche</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        medical: {
                            dark: '#004d61',
                            teal: '#008080',
                        }
                    }
                }
            }
        }
    </script>

    <script async src="https://cse.google.com/cse.js?cx=93d2285b0420a4723"></script>
    
    <style>
        /* Geringe Overrides, damit sich das Google-Widget nahtlos in das Tailwind-Design einfügt */
        .gsc-control-cse {
            font-family: ui-sans-serif, system-ui, sans-serif !important;
            border: none !important;
            padding: 0 !important;
            background-color: transparent !important;
        }
        .gsc-search-button-v2 {
            background-color: #008080 !important;
            border-color: #008080 !important;
            border-radius: 8px !important;
            padding: 10px 20px !important;
        }
        .gsc-input-box {
            border-radius: 8px !important;
            border: 1px solid #cbd5e1 !important;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased font-sans">

    <div class="bg-red-600 text-white text-center py-3 px-4 font-semibold text-sm shadow-md transition-all">
        ⚠️ <span class="font-bold">Wichtiger Hinweis:</span> Bei akuten, lebensbedrohlichen Beschwerden wählen Sie bitte sofort den Notruf: 
        <a href="tel:112" class="underline hover:text-red-100 ml-1">112 (DE)</a> / 
        <a href="tel:144" class="underline hover:text-red-100 ml-1">144 (AT)</a>.
    </div>

    <div class="max-w-3xl mx-auto my-16 px-4">
        
        <header class="text-center mb-10">
            <h1 class="text-medical-dark text-4xl font-extrabold tracking-tight mb-3 flex items-center justify-center gap-2">
                MedInfo
            </h1>
            <p class="text-slate-500 text-lg max-w-xl mx-auto">
                Geprüfte, verständliche Gesundheitsinformationen aus verlässlichen Quellen.
            </p>
        </header>

        <main class="bg-white p-8 rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-200 mb-12">
            <div class="min-h-[60px]">
                <div class="gcse-search"></div>
            </div>
        </main>

        <section class="text-center">
            <h2 class="text-xs uppercase tracking-wider text-slate-400 font-bold mb-5">
                Indexierte und geprüfte Partnerportale
            </h2>
            
            <div class="flex flex-wrap justify-center gap-4">
                
                <div class="flex items-center gap-3 bg-slate-100 border border-slate-200/60 rounded-xl px-4 py-2.5 animate-pulse w-44">
                    <div class="w-6 h-6 bg-slate-300 rounded-full shrink-0"></div>
                    <div class="space-y-1.5 w-full">
                        <div class="h-3 bg-slate-300 rounded w-5/6"></div>
                        <div class="h-2 bg-slate-200 rounded w-1/2"></div>
                    </div>
                </div>

                <div class="flex items-center gap-3 bg-slate-100 border border-slate-200/60 rounded-xl px-4 py-2.5 animate-pulse w-44">
                    <div class="w-6 h-6 bg-slate-300 rounded-full shrink-0"></div>
                    <div class="space-y-1.5 w-full">
                        <div class="h-3 bg-slate-300 rounded w-4/5"></div>
                        <div class="h-2 bg-slate-200 rounded w-2/3"></div>
                    </div>
                </div>

                <div class="flex items-center gap-3 bg-slate-100 border border-slate-200/60 rounded-xl px-4 py-2.5 animate-pulse w-44">
                    <div class="w-6 h-6 bg-slate-300 rounded-full shrink-0"></div>
                    <div class="space-y-1.5 w-full">
                        <div class="h-3 bg-slate-300 rounded w-full"></div>
                        <div class="h-2 bg-slate-200 rounded w-1/3"></div>
                    </div>
                </div>

                <div class="flex items-center gap-3 bg-slate-100 border border-slate-200/60 rounded-xl px-4 py-2.5 animate-pulse w-44">
                    <div class="w-6 h-6 bg-slate-300 rounded-full shrink-0"></div>
                    <div class="space-y-1.5 w-full">
                        <div class="h-3 bg-slate-300 rounded w-3/4"></div>
                        <div class="h-2 bg-slate-200 rounded w-1/2"></div>
                    </div>
                </div>

            </div>
        </section>

    </div>

</body>
</html>
